<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestAus — Portal People · WAP | WAAW by Alok</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;
    --text:#1a1916;--text2:#6b6860;--text3:#9c9a92;
    --accent:#1a5c3a;--accent-light:#e8f5ee;--accent-mid:#2d7a52;
    --danger:#b91c1c;--danger-light:#fef2f2;
    --warn:#92400e;--warn-light:#fffbeb;
    --info:#1e40af;--info-light:#eff6ff;
    --purple:#5b21b6;--purple-light:#f5f3ff;
    --radius:10px;--radius-sm:6px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 12px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  /* #app gerenciado abaixo com overflow-x:hidden */
  #sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;min-width:0}
  #menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99}
  #menu-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text2)}
  @media(max-width:768px){#menu-toggle{display:flex;align-items:center;justify-content:center}}
  #main{flex:1;min-width:0;width:100%;display:flex;flex-direction:column;overflow-y:auto}
  #topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;flex-shrink:0}
  #content{padding:clamp(16px,3vw,28px) clamp(20px,4vw,40px);max-width:1200px;width:100%;box-sizing:border-box;margin:0 auto}

  /* Login */
  #login-screen{min-height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#f0f4f1 0%,#e8ede9 50%,#f5f4f0 100%);padding:20px;position:fixed;top:0;left:0}
  .login-wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:0 16px;box-sizing:border-box}
  .login-brand{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:10px}
  .login-brand-name{font-size:26px;font-weight:600;color:var(--accent);letter-spacing:-.8px;line-height:1}
  .login-brand-sub{font-size:12px;color:var(--text3);letter-spacing:.3px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 36px 32px;width:100%;box-shadow:0 8px 32px rgba(26,92,58,.08),0 2px 8px rgba(0,0,0,.04)}
  .login-card-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}
  .login-card-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
  .login-footer{margin-top:20px;font-size:11px;color:var(--text3);text-align:center}

  /* Sidebar */
  /* ── Sidebar refined — Linear/Notion style ── */
  .sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
  .brand-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.2px;line-height:1.2}
  .brand-sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.2px}
  .sidebar-user{padding:10px 12px;margin:8px 8px 4px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:9px;cursor:default}
  .sidebar-user:hover{background:var(--surface2)}
  .avatar{width:26px;height:26px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;flex-shrink:0;letter-spacing:-.3px}
  .user-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
  .user-role{font-size:10px;color:var(--text3);margin-top:1px;text-transform:capitalize;letter-spacing:.1px}
  nav{padding:6px 0 10px;flex:1}
  .nav-section{padding:14px 16px 4px;font-size:9.5px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;opacity:.7}
  .nav-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 8px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:400;transition:background .12s,color .12s;line-height:1.4}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:#eef5f1;color:#1a5c3a;font-weight:500}
  .nav-item.active .nav-icon svg{stroke:#1a5c3a;opacity:1}
  .nav-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.6}
  .nav-item:hover .nav-icon,.nav-item.active .nav-icon{opacity:1}
  .nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;line-height:1.5}
  .sidebar-footer{padding:10px 12px 14px;border-top:1px solid var(--border);margin-top:auto}
  .nav-parent{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 8px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:400;transition:background .12s,color .12s;user-select:none;line-height:1.4}
  .nav-parent:hover{background:var(--surface2);color:var(--text)}
  .nav-parent.open{color:var(--text);font-weight:500}
  .nav-chevron{margin-left:auto;width:14px;height:14px;display:flex;align-items:center;justify-content:center;opacity:.4;transition:transform .18s,opacity .12s;flex-shrink:0}
  .nav-parent:hover .nav-chevron,.nav-parent.open .nav-chevron{opacity:.7}
  .nav-chevron.open{transform:rotate(90deg)}
  .nav-sub{overflow:hidden;max-height:0;transition:max-height .2s ease;margin-left:0}
  .nav-sub.open{max-height:200px}
  .nav-subitem{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 32px;margin:1px 8px;border-radius:6px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:400;transition:background .12s,color .12s;line-height:1.4;position:relative}
  .nav-subitem::before{content:'';position:absolute;left:20px;top:50%;transform:translateY(-50%);width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}
  .nav-subitem:hover{background:var(--surface2);color:var(--text2)}
  .nav-subitem.active{color:#1a5c3a;font-weight:500;background:#eef5f1}
  .nav-subitem.active::before{opacity:1;background:#1a5c3a}

  /* Forms */
  .form-group{margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
  input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,92,58,.08)}
  textarea{resize:vertical;min-height:80px}
  .form-hint{font-size:11px;color:var(--text3);margin-top:4px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .15s;line-height:1.4}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-mid)}
  .btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-secondary:hover{background:var(--surface2);color:var(--text)}
  .btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-full{width:100%;justify-content:center;padding:10px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(14px,3vw,20px);box-shadow:var(--shadow);box-sizing:border-box}
  .card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
  .card-sub{font-size:12px;color:var(--text3)}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .stat-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .stat-value{font-size:24px;font-weight:600;letter-spacing:-0.5px;line-height:1}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
  .stat-green{color:var(--accent)}.stat-red{color:var(--danger)}.stat-amber{color:var(--warn)}.stat-blue{color:var(--info)}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
  .badge-pending{background:#fef3c7;color:#92400e}
  .badge-approved{background:#d1fae5;color:#065f46}
  .badge-rejected{background:#fee2e2;color:#991b1b}
  .badge-done{background:#e0e7ff;color:#3730a3}
  .badge-cancelled{background:var(--surface2);color:var(--text3)}
  .badge-critical{background:#fee2e2;color:#991b1b}
  .badge-ok{background:#d1fae5;color:#065f46}
  .badge-warn{background:#fef3c7;color:#92400e}
  .badge-info{background:var(--info-light);color:var(--info)}

  /* Table */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;background:var(--surface)}
  th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
  td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}

  /* Progress */
  .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;transition:width .3s}
  .progress-green{background:var(--accent)}.progress-amber{background:#f59e0b}.progress-red{background:var(--danger)}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--surface);border-radius:14px;padding:28px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:4px}
  .modal-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;border-top:1px solid var(--border);padding-top:18px}

  /* Misc */
  .page-header{margin-bottom:20px}
  .page-title{font-size:17px;font-weight:600;letter-spacing:-.3px;line-height:1.3}
  .page-desc{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.4}
  .attention-block{background:#fffbeb;border:1px solid #fde68a;border-left:3px solid #f59e0b;border-radius:var(--radius);padding:14px 16px;margin-bottom:20px}
  .attention-title{font-size:11px;font-weight:600;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}
  .attention-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #fde68a}
  .attention-item:last-child{border-bottom:none;padding-bottom:0}
  .form-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:block}
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
  .empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty-icon{font-size:32px;margin-bottom:14px;opacity:.45;display:block}
  .empty-text{font-size:14px;font-weight:500;margin-bottom:6px;color:var(--text2)}
  .empty-sub{font-size:12px;color:var(--text3);line-height:1.6;max-width:280px;margin:0 auto}
  .breadcrumb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);margin-bottom:4px;flex-wrap:wrap}
  .breadcrumb span{cursor:pointer}.breadcrumb span:hover{color:var(--text2)}
  .breadcrumb-sep{opacity:.35;font-size:10px}
  .skeleton{background:var(--surface2);border-radius:4px;animation:sk 1.4s ease-in-out infinite}
  @keyframes sk{0%,100%{opacity:.35}50%{opacity:.8}}
  .section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:block}
  .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;border-left:3px solid}
  .alert-info{background:var(--info-light);color:var(--info);border-color:var(--info)}
  .alert-warn{background:var(--warn-light);color:var(--warn);border-color:#f59e0b}
  .alert-success{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
  .alert-danger{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}
  .flex{display:flex;align-items:center}
  .flex-between{display:flex;align-items:center;justify-content:space-between}
  .gap-2{gap:8px}.gap-3{gap:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
  .ai-bubble{background:var(--purple-light);border:1px solid #ddd6fe;border-radius:var(--radius);padding:14px 16px;font-size:13px;color:var(--purple);line-height:1.6}
  .ai-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;opacity:.7}
  .loading{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3)}
  .dot-pulse{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px}
  .cal-header{text-align:center;padding:6px 0;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
  .cal-day{min-height:36px;padding:4px;border-radius:4px;font-size:12px;cursor:pointer;position:relative}
  .cal-day.today{background:var(--accent-light);font-weight:600;color:var(--accent)}
  .cal-day.has-event{background:#dbeafe}
  .cal-day.other-month{opacity:.3}
  .cal-day.conflict{background:#fef3c7;outline:1.5px solid #f59e0b}
  .cal-day.conflict.has-event{background:#fef3c7}
  .cal-num{margin-bottom:2px}
  .cal-dot{width:4px;height:4px;border-radius:50%;margin:1px auto}
  /* ── Responsive system ── */
  @media(max-width:1280px){
    #content{max-width:100%}
  }
  @media(max-width:1024px){
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    #content{padding:20px 24px}
  }
  @media(max-width:900px){
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .form-row{grid-template-columns:1fr}
    #content{padding:16px 20px}
  }
  @media(max-width:768px){
    #sidebar{position:fixed;left:-220px;top:0;height:100vh;z-index:100;transition:left .25s;box-shadow:none}
    #sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.12)}
    #menu-overlay{display:block!important}
    #topbar{padding:0 16px}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .form-row{grid-template-columns:1fr}
    #content{padding:14px 16px}
    .modal{width:calc(100vw - 32px)!important;max-width:100%!important;padding:20px 16px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  }
  @media(max-width:600px){
    .stat-grid{grid-template-columns:1fr}
    .page-title{font-size:16px}
    .card{padding:14px}
  }
  @media(max-width:520px){
    .stat-grid{grid-template-columns:1fr}
  }
  @media(max-width:480px){
    .stat-grid{grid-template-columns:1fr}
    .form-row{grid-template-columns:1fr}
    #content{padding:12px}
  }
  /* ── Portal layout completo ── */
  .portal-root{flex:1;width:100%;min-width:0;background:var(--bg);overflow-y:auto;min-height:100vh}
  .portal-inner{max-width:1320px;margin:0 auto;width:100%;box-sizing:border-box;padding:clamp(28px,5vw,52px) clamp(24px,5vw,52px)}
  .portal-header{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .portal-logo-wrap{width:40px;height:40px;border-radius:10px;background:#1a5c3a;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .portal-eyebrow{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.1px}
  .portal-greeting{font-size:24px;font-weight:600;color:var(--text);letter-spacing:-.5px;line-height:1.2}
  .portal-date{font-size:13px;color:var(--text3);margin-bottom:44px;padding-left:54px}
  .portal-section{margin-bottom:40px}
  .portal-section-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .portal-section-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
  .portal-section-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
  .portal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .portal-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:28px 24px 52px;position:relative;display:flex;flex-direction:column;min-height:180px;box-shadow:var(--shadow);transition:border-color .18s,transform .18s,box-shadow .18s}
  .portal-card-active{cursor:pointer}
  .portal-card-disabled{opacity:.58;cursor:default}
  .portal-footer{text-align:center;font-size:11px;color:var(--text3);padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .portal-footer-sep{opacity:.3}
  .portal-footer-logout{cursor:pointer;color:var(--danger);opacity:.7}
  .portal-footer-logout:hover{opacity:1}
  @media(max-width:1280px){.portal-grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:960px){.portal-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.portal-grid{grid-template-columns:1fr}.portal-date{padding-left:0}.portal-inner{padding:20px 16px}}
  /* ── App layout fix ── */
  #app{display:flex;min-height:100vh;overflow-x:hidden}
  .app-shell{display:flex;width:100%;min-height:100vh;overflow-x:hidden}
  /* ══════════════════════════════════════════
     LUMI — Chat Assistente (Floating)
     ══════════════════════════════════════════ */

  /* Botão flutuante */
  #lumi-fab{position:fixed;bottom:28px;right:28px;z-index:1000;width:56px;height:56px;border-radius:50%;background:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.14),0 1px 6px rgba(0,0,0,.08);padding:0;transition:transform .2s ease,box-shadow .2s ease;display:none;align-items:center;justify-content:center}
  #lumi-fab:hover{transform:scale(1.08);box-shadow:0 8px 28px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.1)}
  #lumi-fab:active{transform:scale(.96)}
  .lumi-fab-badge{position:absolute;top:2px;right:2px;width:14px;height:14px;border-radius:50%;background:#ef4444;border:2px solid #fff;display:none}
  .lumi-fab-badge.visible{display:block}

  /* Painel do chat */
  #lumi-panel{position:fixed;bottom:96px;right:28px;z-index:999;width:360px;max-width:calc(100vw - 40px);background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.14),0 2px 12px rgba(0,0,0,.08);display:none;flex-direction:column;overflow:hidden;max-height:560px;border:1px solid rgba(0,0,0,.06)}
  #lumi-panel.open{display:flex;animation:lumi-slide-in .22s cubic-bezier(.34,1.56,.64,1)}
  @keyframes lumi-slide-in{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

  /* Header do chat */

<script>
// ══════════════════════════════════════════
// SUPABASE — configuração
// ══════════════════════════════════════════
// ⚠️ SEGURANÇA: credenciais expostas no frontend — mover para variáveis de ambiente em produção
const SUPABASE_URL  = 'https://qbyoprtefkdgcnhedxtf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFieW9wcnRlZmtkZ2NuaGVkeHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTk1MzUsImV4cCI6MjA5MDQ3NTUzNX0.9C92opyhCNewB9vRzigfx_Tmz-SFpXMhwKZ0YCe2XLQ'; // ⚠️ anon key — RLS deve estar habilitado no Supabase
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════
let state = {
  currentUser: null,
  profile: null,
  view: 'dashboard',
  toast: null,
  // dados carregados do banco
  users: [],
  colaboradores: [],
  solicitacoes: [],
  // loading
  loading: false,
  // login
  loginEmail: '', loginPass: '', loginError: '', loginLoading: false,
  // modais / filtros
  approvalModal: null, approvalObs: '',
  modalUsuario: null,
  newReq: { tipo: 'Férias', dataInicio: '', dataFim: '', obs: '' },
  menuAusenciasOpen: true,
  filtroAprovUser: '', filtroAprovStatus: 'Pendente', filtroAprovInicio: '', filtroAprovFim: '',
  filtroUsuNome: '', filtroUsuDept: '', filtroUsuStatus: '',
  dashFiltroUser: '', dashFiltroStatus: '', dashFiltroInicio: '', dashFiltroFim: '',
  adminDashUser: '', adminDashDept: '', adminDashStatus: '', adminDashTipo: '',
  aiLoading: false, aiResponse: '',
  peopleSelected: [], peopleFiltroUser: '', peopleFiltroInicio: '', peopleFiltroFim: '',
  // portal people
  moduloAtivo: null,       // null = portal | 'ausencias' | 'mov'
  // módulo MOV
  movView: 'dashboard',
  movStep: 1,
  movTipoSel: null,
  movDetalheId: null,
  movSolicitacoes: [],
  movFiltroStatus: '',
  movFiltroTipo: '',
  movFiltroDept: '',
};

const DEPARTAMENTOS = ['Tecnologia','People','Operações','Produto','Financeiro','Jurídico','Comercial'];
const AREAS = ['Inovação & Desenvolvimento de Software','Infraestrutura e Serviços','Dados','Produto Digital','Experiência do Cliente','Estratégia e Projetos','Outras'];

// ══════════════════════════════════════════
// SUPABASE — operações de dados
// ══════════════════════════════════════════
async function loadAllData() {
  const [{ data: users }, { data: colabs }, { data: sols }] = await Promise.all([
    sb.from('users').select('*'),
    sb.from('colaboradores').select('*'),
    sb.from('solicitacoes').select('*').order('criado_em', { ascending: false }),
  ]);
  state.users        = users        || [];
  state.colaboradores = colabs      || [];
  state.solicitacoes  = sols        || [];
}

async function dbCriarSolicitacao(data) {
  const { error } = await sb.from('solicitacoes').insert([data]);
  if (error) throw error;
  await loadAllData();
}

async function dbAtualizarSolicitacao(id, updates) {
  const { error } = await sb.from('solicitacoes').update({ ...updates, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) throw error;
  await loadAllData();
}

async function dbSalvarUsuario(form) {
  if (form.id) {
    const { error } = await sb.from('users').update({
      name: form.nome, email: form.email, role: form.role,
      funcao: form.funcao, squad: form.squad, squad_nome: form.squad_nome||null,
      departamento: form.departamento,
      gestor_id: form.gestorId || null, status: form.status,
    }).eq('id', form.id);
    if (error) throw error;
    // atualizar ficha de colaborador se data de admissão foi informada
    if (form.inicioContrato) {
      const existing = state.colaboradores.find(c => c.user_id === form.id);
      if (existing) {
        await sb.from('colaboradores').update({
          inicio_contrato: form.inicioContrato,
          dias_ciclo: form.diasCiclo || 30,
        }).eq('user_id', form.id);
      } else {
        await sb.from('colaboradores').insert([{
          user_id: form.id,
          inicio_contrato: form.inicioContrato,
          dias_ciclo: form.diasCiclo || 30,
        }]);
      }
    }
  } else {
    // Criar via invite — funciona mesmo com signUp desativado
    const { data: authData, error: authErr } = await sb.auth.signInWithPassword({
      email: 'dummy', password: 'dummy'
    }).catch(() => ({ data: null, error: null }));

    // Usar inviteUserByEmail que funciona com signUp desativado
    const { data: inviteData, error: inviteErr } = await sb.auth.admin?.inviteUserByEmail
      ? await sb.auth.admin.inviteUserByEmail(form.email, {
          data: { name: form.nome, role: form.role, squad: form.squad, funcao: form.funcao, departamento: form.departamento }
        })
      : await fetch('https://qbyoprtefkdgcnhedxtf.supabase.co/auth/v1/invite', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFieW9wcnRlZmtkZ2NuaGVkeHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTk1MzUsImV4cCI6MjA5MDQ3NTUzNX0.9C92opyhCNewB9vRzigfx_Tmz-SFpXMhwKZ0YCe2XLQ',
            'Authorization': 'Bearer ' + ((await sb.auth.getSession()).data.session?.access_token || '')
          },
          body: JSON.stringify({ email: form.email })
        }).then(async r => {
          const d = await r.json();
          if (!r.ok) return { data: null, error: d };
          return { data: { user: d }, error: null };
        });

    if (inviteErr) throw new Error(inviteErr.message || 'Erro ao criar usuário. Verifique o e-mail.');

    const newUserId = inviteData?.user?.id;
    if (newUserId) {
      // atualizar perfil com dados completos
      await sb.from('users').update({
        name: form.nome, role: form.role, squad: form.squad,
        funcao: form.funcao, departamento: form.departamento,
        gestor_id: form.gestorId || null, status: 'ativo',
      }).eq('id', newUserId);

      // inserir ficha de colaborador
      if (form.role !== 'admin') {
        await sb.from('colaboradores').insert([{
          user_id: newUserId,
          inicio_contrato: form.inicioContrato || new Date().toISOString().slice(0,10),
          dias_ciclo: form.diasCiclo || 30,
        }]);
      }
    }
  }
  await loadAllData();
}

async function uploadAvatar(userId, file) {
  const ext = file.name.split('.').pop();
  const path = userId + '.' + ext;
  const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
  if (upErr) throw upErr;
  const { data } = sb.storage.from('avatars').getPublicUrl(path);
  const { error: dbErr } = await sb.from('users').update({ avatar_url: data.publicUrl }).eq('id', userId);
  if (dbErr) throw dbErr;
  await loadAllData();
}

async function dbToggleStatus(userId) {
  const u = state.users.find(x => x.id === userId);
  if (!u) return;
  const { error } = await sb.from('users').update({ status: u.status === 'ativo' ? 'inativo' : 'ativo' }).eq('id', userId);
  if (error) throw error;
  await loadAllData();
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function calcDias(inicio, fim) {
  if (!inicio || !fim) return 0;
  return Math.round((new Date(fim) - new Date(inicio)) / 86400000) + 1;
}

function getSaldo(userId) {
  const colab = state.colaboradores.find(c => c.user_id === userId);
  if (!colab) return { diasCiclo: 30, usados: 0, saldo: 30 };
  const usados = state.solicitacoes
    .filter(s => s.user_id === userId && ['Aprovada','Realizada'].includes(s.status))
    .reduce((sum, s) => sum + s.dias, 0);
  return { diasCiclo: colab.dias_ciclo, usados, saldo: Math.max(0, colab.dias_ciclo - usados) };
}

function getStatusBadge(status, sol) {
  const map = { Pendente:'badge-pending', Aprovada:'badge-approved', Recusada:'badge-rejected', Realizada:'badge-done', Cancelada:'badge-cancelled' };
  let badge = `<span class="badge ${map[status]||'badge-pending'}">${status}</span>`;
  // complemento de ciência People — apenas informativo, não altera status
  if (sol && status === 'Aprovada') {
    if (sol.people_acknowledged) {
      badge += ` <span class="badge" style="background:#d1fae5;color:#065f46;font-size:10px">✓ People confirmado</span>`;
    } else {
      badge += ` <span class="badge" style="background:#fef3c7;color:#92400e;font-size:10px">⏳ Aguarda confirmação</span>`;
    }
  }
  return badge;
}

function getSaldoStatus(saldo, usados, ciclo) {
  const pct = (usados / ciclo) * 100;
  if (pct >= 100) return { label:'⚫ Sem saldo', cls:'badge-cancelled' };
  if (pct >= 90)  return { label:'🔴 Crítico',   cls:'badge-critical' };
  if (pct >= 70)  return { label:'🟡 Atenção',   cls:'badge-warn' };
  return { label:'🟢 Disponível', cls:'badge-ok' };
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR');
}

function getUserById(id) { return state.users.find(u => u.id === id); }

function showToast(msg, type='success') {
  state.toast = { msg, type };
  render();
  setTimeout(() => { state.toast = null; render(); }, 3500);
}

function _idsVisivelParaGestor(u) {
  // Colaboradores vinculados diretamente a este gestor
  const idsVinculados = state.users
    .filter(x => x.gestor_id === u.id && x.role !== 'admin')
    .map(x => x.id);
  // Fallback: colaboradores sem gestor no mesmo departamento
  const meuDept = u.departamento || u.squad;
  const idsSemGestor = state.users
    .filter(x => !x.gestor_id && (x.departamento||x.squad) === meuDept && x.role !== 'admin')
    .map(x => x.id);
  return [...new Set([...idsVinculados, ...idsSemGestor])];
}

function getSolicitacoesDaArea(u) {
  if (!u) return [];
  if (u.role === 'admin') return state.solicitacoes;
  if (u.role === 'people') return state.solicitacoes; // people vê todas para ciência
  if (u.role === 'gestor') {
    const ids = _idsVisivelParaGestor(u);
    return state.solicitacoes.filter(s => ids.includes(s.user_id));
  }
  return state.solicitacoes.filter(s => s.user_id === u.id);
}

// Helper isolado para escopo people — preparado para evolução futura
function getSolicitacoesParaPeople(u) {
  // Atualmente retorna todas (comportamento atual)
  // Futuramente pode filtrar por departamento/área do people
  return state.solicitacoes;
}

function getPendingDaArea(u) {
  return getSolicitacoesDaArea(u).filter(s => s.status === 'Pendente').length;
}

function getColaboradoresDaArea(u) {
  if (!u) return [];
  if (u.role === 'admin') return state.colaboradores;
  if (u.role === 'gestor') {
    const ids = _idsVisivelParaGestor(u);
    return state.colaboradores.filter(c => ids.includes(c.user_id));
  }
  return state.colaboradores.filter(c => c.user_id === u.id);
}

// ══════════════════════════════════════════
// AÇÕES
// ══════════════════════════════════════════
async function login() {
  if (state.loginLoading) return;
  state.loginLoading = true; state.loginError = ''; render();
  const { data, error } = await sb.auth.signInWithPassword({
    email: state.loginEmail.trim(),
    password: state.loginPass,
  });
  if (error) {
    state.loginError = 'E-mail ou senha incorretos.';
    state.loginLoading = false; render(); return;
  }
  const { data: profile } = await sb.from('users').select('*').eq('id', data.user.id).single();
  if (!profile || profile.status === 'inativo') {
    await sb.auth.signOut();
    state.loginError = 'Usuário inativo. Contate o administrador.';
    state.loginLoading = false; render(); return;
  }
  state.currentUser = profile;
  await loadAllData();
  state.loginLoading = false;
  state.moduloAtivo = null; // todos entram no portal
  state.view = 'dashboard';
  render();
}

async function logout() {
  await sb.auth.signOut();
  state.currentUser = null;
  state.view = 'dashboard';
  state.loginEmail = ''; state.loginPass = '';
  render();
}

async function criarSolicitacao() {
  const { tipo, dataInicio, dataFim, obs } = state.newReq;
  if (!dataInicio || !dataFim) { showToast('Preencha as datas', 'error'); return; }
  const dias = calcDias(dataInicio, dataFim);
  if (dias <= 0) { showToast('Data fim deve ser após data início', 'error'); return; }
  const saldo = getSaldo(state.currentUser.id);
  if (saldo.saldo < dias) { showToast(`Limite insuficiente. Disponível: ${saldo.saldo} dias`, 'error'); return; }
  const overlap = state.solicitacoes.find(s =>
    s.user_id === state.currentUser.id &&
    ['Pendente','Aprovada'].includes(s.status) &&
    !(s.data_fim < dataInicio || s.data_inicio > dataFim)
  );
  if (overlap) { showToast('Conflito de datas com ausência já registrada', 'error'); return; }
  try {
    await dbCriarSolicitacao({
      user_id: state.currentUser.id, tipo,
      data_inicio: dataInicio, data_fim: dataFim, dias,
      status: 'Pendente', obs,
      criado_em: new Date().toISOString().slice(0,10),
    });
    state.newReq = { tipo: 'Férias', dataInicio: '', dataFim: '', obs: '' };
    state.modal = null;
    showToast('Solicitação enviada para o gestor ✓');
  } catch(e) { showToast('Erro ao criar solicitação', 'error'); }
}

async function aprovar(id) {
  try {
    await dbAtualizarSolicitacao(id, {
      status: 'Aprovada',
      obs: state.approvalObs || 'Aprovado',
      approved_by: state.currentUser?.id || null,          // quem aprovou
      approved_at: new Date().toISOString(),                // quando aprovou
    });
    state.approvalModal = null; state.approvalObs = '';
    showToast('Solicitação aprovada com sucesso ✓');
  } catch(e) { showToast('Erro ao aprovar', 'error'); }
}

async function recusar(id) {
  try {
    await dbAtualizarSolicitacao(id, { status: 'Recusada', obs: state.approvalObs || 'Recusado pelo gestor' });
    state.approvalModal = null; state.approvalObs = '';
    showToast('Ausência recusada', 'error');
  } catch(e) { showToast('Erro ao recusar', 'error'); }
}

async function cancelar(id) {
  try {
    await dbAtualizarSolicitacao(id, { status: 'Cancelada' });
    showToast('Solicitação cancelada');
  } catch(e) { showToast('Erro ao cancelar', 'error'); }
}

async function registrarCiencia(ids) {
  const agora = new Date().toISOString();
  const u = state.currentUser;
  try {
    for (const id of ids) {
      // atualiza localmente para feedback imediato
      const s = state.solicitacoes.find(x => x.id === id);
      if (s) {
        s.people_acknowledged = true;
        s.people_acknowledged_by = u.name;
        s.people_acknowledged_at = agora;
      }
      // persiste no banco (campos adicionais via upsert)
      await sb.from('solicitacoes').update({
        people_acknowledged: true,
        people_acknowledged_by: u.id,
        people_acknowledged_at: agora,
      }).eq('id', id);
    }
    state.peopleSelected = [];
    showToast(ids.length > 1 ? ids.length + ' ciências registradas ✓' : 'Confirmação registrada ✓');
    render();
  } catch(e) {
    // fallback: atualiza só local se banco não tiver coluna ainda
    showToast('Confirmação registrada localmente ✓');
    state.peopleSelected = [];
    render();
  }
}

function togglePeopleSelect(id) {
  const idx = state.peopleSelected.indexOf(id);
  if (idx === -1) state.peopleSelected.push(id);
  else state.peopleSelected.splice(idx, 1);
  render();
}

async function salvarUsuario(form) {
  const nome = form.nome.trim(); const email = form.email.trim().toLowerCase();
  if (!nome || !email) { showToast('Nome e e-mail são obrigatórios', 'error'); return; }
  if (!form.departamento) { showToast('Departamento é obrigatório', 'error'); return; }
  if (!form.squad) { showToast('Área é obrigatória', 'error'); return; }
  if (form.role === 'gestor' && !form.departamento) { showToast('Gestor deve ter um departamento vinculado', 'error'); return; }
  if (!form.id && !form.inicioContrato) { showToast('Data de admissão é obrigatória', 'error'); return; }
  try {
    await dbSalvarUsuario(form);
    state.modalUsuario = null;
    showToast(form.id ? 'Usuário atualizado ✓' : 'Usuário criado ✓');
  } catch(e) { showToast('Erro: ' + (e.message || 'verifique os dados'), 'error'); }
}

async function toggleStatus(userId) {
  try {
    await dbToggleStatus(userId);
    const u = state.users.find(x => x.id === userId);
    showToast(u?.status === 'ativo' ? 'Usuário reativado' : 'Usuário inativado');
  } catch(e) { showToast('Erro ao alterar status', 'error'); }
}

function abrirModalUsuario(user) {
  const colab = state.colaboradores.find(c => c.user_id === user?.id);
  state.modalUsuario = user ? {
    ...user,
    inicioContrato: colab?.inicio_contrato || '',
    squad_nome: user.squad_nome || '',
  } : {
    id: null, nome: '', email: '', role: 'colaborador',
    funcao: '', squad: '', squad_nome: '', departamento: '', gestorId: '', status: 'ativo',
    inicioContrato: '',
  };
  state.avatarPreview = user?.avatar_url || null;
  render();
}

async function askAI(prompt) {
  state.aiLoading = true; state.aiResponse = ''; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    state.aiResponse = data.content?.[0]?.text || 'Sem resposta.';
  } catch(e) { state.aiResponse = 'Erro ao consultar IA.'; }
  state.aiLoading = false; render();
}

// ── Palavras bloqueadas — dados sensíveis ──────────────────────────────────
const LUMI_BLOCKED = [
  'salario','salários','remuneracao','remuneração','reajuste','aumento salarial',
  'quanto ganha','quanto recebe','folha de pagamento','folha pagamento',
  'holerite','contracheque','cpf','rg','dado pessoal','dados pessoais',
  'endereco','endereço','telefone pessoal','celular pessoal','senha','password',
  'conta bancaria','conta bancária','banco','pix','cnpj individual',
  'dado confidencial','dado sensivel','dado sensível','plr','bonus','bônus',
  'rescisao','rescisão','verba','compensacao','compensação',
];

function lumiCheckBlocked(text) {
  const t = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  return LUMI_BLOCKED.some(w =>
    t.includes(w.normalize('NFD').replace(/[\u0300-\u036f]/g,''))
  );
}

// ── Normalização robusta ────────────────────────────────────────────────────
function lumiNorm(text) {
  return text.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .replace(/[^\w\s]/g, ' ')  // pontuação → espaço
    .replace(/\s+/g, ' ')      // múltiplos espaços → um
    .trim();
}

// ── Contexto seguro do sistema ──────────────────────────────────────────────
function lumiGetContext() {
  const u = state.currentUser;
  if (!u) return null;
  const sols = state.solicitacoes || [];
  const hoje = new Date().toISOString().slice(0,10);
  const em7   = new Date(Date.now()+7*864e5).toISOString().slice(0,10);
  return {
    u,
    is: (...roles) => roles.includes(u.role),
    pendentes:    sols.filter(s => s.status === 'Pendente').length,
    proxima7:     sols.filter(s => ['Aprovada','Pendente'].includes(s.status) && s.data_inicio >= hoje && s.data_inicio <= em7).length,
    totalUsers:   (state.users||[]).filter(x => x.status === 'ativo' && x.role !== 'admin').length,
    movPendentes: (state.movSolicitacoes||[]).filter(s => ['Enviada','Em análise'].includes(s.status)).length,
    meusSols:     sols.filter(s => s.user_id === u.id).length,
  };
}

function lumiNavigate(modulo, view) {
  if (modulo !== undefined) state.moduloAtivo = modulo;
  if (view)                 state.view = view;
  render();
}

// ── Engine principal ────────────────────────────────────────────────────────
function lumiRespond(input) {
  const ctx = lumiGetContext();
  if (!ctx) return { msg: 'Não consegui carregar o contexto. Tente recarregar a página.', nav: null };

  // Bloqueio de segurança
  if (lumiCheckBlocked(input)) {
    return { msg: '🔒 Não posso exibir informações sensíveis por este canal.', nav: null, blocked: true };
  }

  const txt = lumiNorm(input);

  // Percorrer intenções em ordem
  const intents = lumiBuildIntents();
  for (const intent of intents) {
    try {
      if (intent.match(txt)) return intent.exec(ctx);
    } catch(e) { /* ignorar erro em intenção individual */ }
  }

  // ── Fallback guiado ───────────────────────────────────────────────────────
  return {
    msg: `Não reconheci exatamente o que você precisa. Posso ajudar com:<br>
<strong>Ausências:</strong> solicitar, ver pendências, aprovar, calendário<br>
<strong>MOV:</strong> abrir vaga, desligamento, mudança de cargo<br>
<strong>Equipe:</strong> ver colaboradores, status da equipe<br><br>
Tente reformular ou use uma das sugestões abaixo.`,
    nav: null
  };
}

let lumiOpen    = false;
let lumiGreeted = false;
let lumiLastModulo = undefined; // rastreia troca de módulo para reset

// Reset completo do estado da Lumi
function lumiReset() {
  lumiGreeted = false;
  lumiOpen    = false;
  const panel = document.getElementById('lumi-panel');
  const msgs  = document.getElementById('lumi-messages');
  const input = document.getElementById('lumi-input');
  const suggs = document.getElementById('lumi-suggestions');
  const btn   = document.getElementById('lumi-send-btn');
  if (panel)  panel.classList.remove('open');
  if (msgs)   msgs.innerHTML = '';
  if (input)  { input.value = ''; }
  if (btn)    btn.disabled = true;
  if (suggs)  suggs.style.display = 'flex'; // mostrar sugestões novamente
}

function lumiToggle() {
  lumiOpen = !lumiOpen;
  const panel = document.getElementById('lumi-panel');
  const badge = document.getElementById('lumi-fab-badge');
  if (lumiOpen) {
    panel.classList.add('open');
    if (!lumiGreeted) {
      lumiGreeted = true;
      const nome = state.currentUser?.name?.split(' ')[0] || '';
      setTimeout(() => {
        lumiAddBotMsg(
          `Olá${nome ? ', <strong>' + nome + '</strong>' : ''}! Sou a Lumi, assistente do GestAus.<br>Como posso te ajudar hoje?`
        );
      }, 180);
    }
    setTimeout(() => document.getElementById('lumi-input')?.focus(), 250);
    badge.classList.remove('visible');
  } else {
    panel.classList.remove('open');
  }
}

function lumiAddMsg(html, type) {
  // type: 'bot' | 'user' | 'blocked' | 'nav'
  const msgs = document.getElementById('lumi-messages');
  if (!msgs) return;

  const isBot = type !== 'user';
  const wrap = document.createElement('div');
  wrap.className = 'lumi-bubble' + (type === 'user' ? ' user' : '');

  if (isBot) {
    wrap.innerHTML = `
      <div class="lumi-bubble-avatar">${LUMI_AVATAR_MINI}</div>
      <div class="lumi-msg ${type === 'blocked' ? 'blocked' : type === 'nav' ? 'nav-msg' : 'bot'}">${html}</div>`;
  } else {
    wrap.innerHTML = `<div class="lumi-msg user">${html}</div>`;
  }
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function lumiAddBotMsg(html, type='bot') {
  lumiAddMsg(html, type);
}

function lumiShowTyping() {
  const msgs = document.getElementById('lumi-messages');
  if (!msgs) return;
  const el = document.createElement('div');
  el.className = 'lumi-typing';
  el.id = 'lumi-typing-indicator';
  el.innerHTML = `
    <div class="lumi-bubble-avatar">${LUMI_AVATAR_MINI}</div>
    <div class="lumi-typing-bubble">
      <div class="lumi-typing-dot"></div>
      <div class="lumi-typing-dot"></div>
      <div class="lumi-typing-dot"></div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function lumiHideTyping() {
  document.getElementById('lumi-typing-indicator')?.remove();
}

function lumiSendMsg() {
  const inputEl  = document.getElementById('lumi-input');
  const sendBtn  = document.getElementById('lumi-send-btn');
  const suggs    = document.getElementById('lumi-suggestions');
  if (!inputEl) return;
  const val = inputEl.value.trim();
  if (!val) return;

  // Mostrar mensagem do usuário
  lumiAddMsg(val, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;
  if (suggs) suggs.style.display = 'none';

  // Typing
  lumiShowTyping();

  setTimeout(() => {
    lumiHideTyping();
    const result = lumiRespond(val);
    sendBtn.disabled = false;

    let html = result.msg.replace(/\n/g, '<br>');
    const tipo = result.blocked ? 'blocked' : result.nav ? 'nav' : 'bot';

    // Botão de navegação manual
    if (result.nav && !result.autoNav) {
      html += `<br><button style="margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#1e5fa8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit" onclick="(function(){try{(${result.nav.toString()})()}catch(e){}})()">
        ${result.navLabel} →
      </button>`;
    }

    lumiAddBotMsg(html, tipo);

    if (result.autoNav && result.nav) {
      setTimeout(() => { try { result.nav(); } catch(e){} }, 800);
    }
  }, 400 + Math.random() * 200);
}

// Compatibilidade: lumiSend mantida para chips antigos
function lumiSend(inputId, responseId, loadingId) { lumiSendMsg(); }

function lumiChip(text) {
  if (!lumiOpen) lumiToggle();
  const inputEl = document.getElementById('lumi-input');
  if (inputEl) {
    inputEl.value = text;
    document.getElementById('lumi-send-btn').disabled = false;
  }
  setTimeout(() => lumiSendMsg(), 80);
}

function viewNova() {
  const u=state.currentUser;
  const saldo=getSaldo(u.id);
  const dias=calcDias(state.newReq.dataInicio,state.newReq.dataFim);
  const saldoApos=saldo.saldo-dias;
  const st=getSaldoStatus(saldo.saldo,saldo.usados,saldo.diasCiclo);
  const barCls=saldo.usados/saldo.diasCiclo>=0.9?'progress-red':'progress-green';
  const barPct=Math.min(100,Math.round(saldo.usados/saldo.diasCiclo*100));

  // Injetar função de atualização de datas no escopo global na primeira renderização
  if (!window._novaSetDataInjected) {
    window._novaSetDataInjected = true;
  }
  window._novaSetDataFn = function(field, val) {
    state.newReq[field] = val;
    const ini = state.newReq.dataInicio;
    const fim = state.newReq.dataFim;
    const preview = document.getElementById('nova-preview');
    const btn     = document.getElementById('nova-btn-enviar');
    if (!ini || !fim) {
      if (preview) preview.style.display = 'none';
      if (btn) btn.disabled = true;
      return;
    }
    const d    = Math.round((new Date(fim) - new Date(ini)) / 86400000) + 1;
    const apos = 0 + saldo.saldo - d;
    if (preview) {
      if (d > 0) {
        preview.style.display = 'block';
        preview.className = 'alert ' + (apos >= 0 ? 'alert-info' : 'alert-danger');
        preview.innerHTML = '📅 Total: <strong>' + d + ' dias corridos</strong> — '
          + (apos >= 0 ? 'limite após: ' + apos + ' dias' : '<strong>Limite insuficiente!</strong>');
      } else {
        preview.style.display = 'none';
      }
    }
    if (btn) btn.disabled = (d <= 0 || apos < 0);
  };

  const previewHtml = dias > 0
    ? '<div id="nova-preview" class="alert ' + (saldoApos >= 0 ? 'alert-info' : 'alert-danger') + '" style="margin-top:14px">'
      + '📅 Total: <strong>' + dias + ' dias corridos</strong> — '
      + (saldoApos >= 0 ? 'limite após: ' + saldoApos + ' dias' : '<strong>Limite insuficiente!</strong>')
      + '</div>'

    + '<div class="flex-between" style="margin-bottom:12px">'

    + '<span style="font-size:11px;color:var(--text3)">' + saldo.diasCiclo + 'd no período</span>'

    + '</div>'

    + '<div class="card" style="background:var(--info-light);border-color:#bfdbfe">'
    + '<div style="font-size:12px;font-weight:600;color:var(--info);margin-bottom:8px">ℹ️ Regras</div>'

    + '</div>'
    + '<style>@media(max-width:700px){#content > div > div[style*="grid-template-columns"]{grid-template-columns:1fr!important}}</style>'

function viewAprovacoes() {
  const u=state.currentUser;
  const solsDaArea=getSolicitacoesDaArea(u);
  const usuariosDaArea=state.users.filter(x=>(x.departamento||x.squad)===(u.departamento||u.squad)&&x.role!=='admin');
  const filtroUser=state.filtroAprovUser||'', filtroStatus=state.filtroAprovStatus||'Pendente';
  const filtroInicio=state.filtroAprovInicio||'', filtroFim=state.filtroAprovFim||'';
  let pendentes=solsDaArea.filter(s=>s.status===filtroStatus);
  if(filtroUser) pendentes=pendentes.filter(s=>s.user_id===filtroUser);
  if(filtroInicio) pendentes=pendentes.filter(s=>s.data_inicio>=filtroInicio);
  if(filtroFim) pendentes=pendentes.filter(s=>s.data_fim<=filtroFim);
  const totalPendentes=solsDaArea.filter(s=>s.status==='Pendente').length;
  return `<div id="content">
    <div class="breadcrumb"><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">GestAus</span><span class="breadcrumb-sep">›</span><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">Portal</span><span class="breadcrumb-sep">›</span><span onclick="state.view='dashboard';render()" style="cursor:pointer">Disponibilidade PJ</span><span class="breadcrumb-sep">›</span><span>Aprovação do Gestor</span></div>
    <div class="page-header"><div class="page-title">Aprovação do Gestor${u.role==='gestor'?' — '+(u.departamento||u.squad):''}</div>
    <div class="page-desc">${totalPendentes} pendente${totalPendentes!==1?'s':''}</div></div>
    <div class="card mb-4" style="padding:14px 16px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;align-items:end">
        <div><label>Colaborador</label><select onchange="state.filtroAprovUser=this.value;render()"><option value="">Todos</option>
          ${(u.role==='admin'?state.users.filter(x=>x.role!=='admin'):usuariosDaArea).map(x=>`<option value="${x.id}" ${filtroUser===x.id?'selected':''}>${x.name.split(' ')[0]}</option>`).join('')}
        </select></div>
        <div><label>Status</label><select onchange="state.filtroAprovStatus=this.value;render()">
          ${['Pendente','Aprovada','Recusada','Realizada'].map(s=>`<option value="${s}" ${filtroStatus===s?'selected':''}>${s}</option>`).join('')}
        </select></div>
        <div><label>De</label><input type="date" value="${filtroInicio}" onchange="state.filtroAprovInicio=this.value;render()"></div>
        <div><label>Até</label><input type="date" value="${filtroFim}" onchange="state.filtroAprovFim=this.value;render()"></div>
      </div>
    </div>
    ${pendentes.length===0?`<div class="empty-state card"><div class="empty-icon">✅</div><div class="empty-text">Nenhuma ausência registrada encontrada</div></div>`:`
    <div style="display:flex;flex-direction:column;gap:12px">
      ${pendentes.map(s=>{
        const usr=getUserById(s.user_id);
        const saldo=getSaldo(s.user_id);
        const diasAteInicio = Math.round((new Date(s.data_inicio)-new Date())/86400000);
        const urgente = diasAteInicio <= 5 && diasAteInicio >= 0;
        return `<div class="card" style="${urgente?'border-left:3px solid #f59e0b;':''}">
          <div class="flex-between" style="margin-bottom:10px">
            <div class="flex gap-3">
              <div class="avatar">${usr?.avatar||'??'}</div>
              <div>
                <div style="font-size:13px;font-weight:600">${usr?.name||'—'}</div>
                <div style="font-size:11px;color:var(--text3)">${usr?.departamento||usr?.squad||'—'} · ${usr?.funcao||'—'}</div>
              </div>
            </div>
            <div style="text-align:right">
              ${getStatusBadge(s.status,s)}
              ${urgente?`<div style="font-size:10px;color:#92400e;margin-top:3px">⚡ Início em ${diasAteInicio}d</div>`:''}
            </div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;background:var(--surface2);border-radius:6px;padding:10px;margin-bottom:12px">
            <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Período</div><div style="font-size:12px;font-weight:500;margin-top:2px">${formatDate(s.data_inicio)} → ${formatDate(s.data_fim)}</div></div>
            <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Duração</div><div style="font-size:12px;font-weight:500;margin-top:2px">${s.dias} dia${s.dias!==1?'s':''}</div></div>
            <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Saldo após</div><div style="font-size:12px;font-weight:500;margin-top:2px;color:${(getSaldo(s.user_id).saldo-s.dias)<0?'var(--danger)':'var(--text)'}">${getSaldo(s.user_id).saldo-s.dias}d</div></div>
          </div>
          ${s.obs?`<div style="font-size:12px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--surface2);border-radius:6px;border-left:2px solid var(--border)">${s.obs}</div>`:''}
          <div class="flex gap-2" style="justify-content:flex-end">
            ${s.status==='Pendente'?`<button class="btn btn-primary btn-sm" onclick="state.approvalModal=${s.id};state.approvalObs='';render()">Revisar →</button>`:`<span style="font-size:12px;color:var(--text3)">${s.status}</span>`}
          </div>
        </div>`;
      }).join('')}
    </div>`}
    ${state.approvalModal?`<div class="modal-overlay" onclick="if(event.target===this){state.approvalModal=null;render()}">
      <div class="modal">
        <div class="modal-title">Revisar solicitação</div>
        <div class="modal-sub">Adicione uma observação antes de decidir</div>
        <div class="form-group"><label>Observação para o colaborador</label>
          <textarea placeholder="Ex: Aprovado. / Favor reagendar para..." oninput="state.approvalObs=this.value">${state.approvalObs}</textarea></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="state.approvalModal=null;render()">Cancelar</button>
          <button class="btn btn-danger" onclick="recusar(${state.approvalModal})">✗ Recusar</button>
          <button class="btn btn-primary" onclick="aprovar(${state.approvalModal})">✓ Aprovar</button>
        </div>
      </div>
    </div>`:''}
  </div>`;
}

function viewEquipe() {
  const u=state.currentUser;
  const colabsDaArea=getColaboradoresDaArea(u);
  const areaLabel=u.role==='gestor'?` — ${u.departamento||u.squad}`:u.role==='admin'?' — todas as áreas':'';
  return `<div id="content">
    <div class="breadcrumb"><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">GestAus</span><span class="breadcrumb-sep">›</span><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">Portal</span><span class="breadcrumb-sep">›</span><span onclick="state.view='dashboard';render()" style="cursor:pointer">Disponibilidade PJ</span><span class="breadcrumb-sep">›</span><span>Equipe</span></div>
    <div class="page-header"><div class="page-title">Equipe${areaLabel}</div>
    <div class="page-desc">${colabsDaArea.length} colaborador${colabsDaArea.length!==1?'es':''}</div></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${colabsDaArea.map(c=>{
        const user=getUserById(c.user_id);
        if(!user) return '';
        const saldo=getSaldo(c.user_id);
        const st=getSaldoStatus(saldo.saldo,saldo.usados,c.dias_ciclo);
        const pct=Math.min(100,Math.round((saldo.usados/c.dias_ciclo)*100));
        const barCls=pct>=90?'progress-red':pct>=70?'progress-amber':'progress-green';
        const proxFerias=state.solicitacoes.filter(s=>s.user_id===c.user_id&&['Aprovada','Pendente'].includes(s.status)&&s.data_inicio>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.data_inicio.localeCompare(b.data_inicio))[0];
        return `<div class="card">
          <div class="flex-between">
            <div class="flex gap-3"><div class="avatar" style="width:40px;height:40px;font-size:13px">${user.avatar||user.name.slice(0,2)}</div>
            <div><div style="font-size:14px;font-weight:600">${user.name}</div>
            <div style="font-size:12px;color:var(--text3)">${user.departamento||user.squad||'—'} · ${user.funcao||'—'}</div></div></div>
            <span class="badge ${st.cls}">${st.label}</span>
          </div>
          <div style="margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;align-items:center">
            <div><div style="font-size:11px;color:var(--text3)">SALDO</div><div style="font-size:20px;font-weight:600;color:var(--accent)">${saldo.saldo}d</div><div style="font-size:11px;color:var(--text3)">${saldo.usados}d usados</div></div>
            <div><div class="flex-between" style="margin-bottom:4px"><span style="font-size:11px;color:var(--text3)">UTILIZAÇÃO</span><span style="font-size:11px;color:var(--text3)">${pct}%</span></div>
            <div class="progress-bar"><div class="progress-fill ${barCls}" style="width:${pct}%"></div></div></div>
            <div style="text-align:right">${proxFerias?`<div style="font-size:11px;color:var(--text3)">PRÓXIMA AUSÊNCIA</div>
            <div style="font-size:12px;font-weight:500">${formatDate(proxFerias.data_inicio)}</div>
            <div style="font-size:11px;color:var(--text3)">${proxFerias.tipo} · ${proxFerias.dias}d</div>`:`<div style="font-size:11px;color:var(--text3)">Nenhuma agendada</div>`}</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Férias e folgas programadas no departamento -->
    ${(()=>{
      const hoje = new Date().toISOString().slice(0,10);
      const idsDaArea = colabsDaArea.map(c => c.user_id);
      const programadas = state.solicitacoes
        .filter(s =>
          idsDaArea.includes(s.user_id) &&
          ['Aprovada','Pendente'].includes(s.status) &&
          s.data_inicio >= hoje
        )
        .sort((a,b) => a.data_inicio.localeCompare(b.data_inicio));

      if (programadas.length === 0) return '';

      return `<div class="card" style="margin-top:16px">
        <div class="card-title" style="margin-bottom:14px">📅 Ausências programadas no departamento</div>
        <div class="table-wrap" style="border:none">
          <table>
            <thead>
              <tr>
                <th>Colaborador</th>
                
                <th>Início</th>
                <th>Fim</th>
                <th>Dias</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${programadas.map(s => {
                const usr = getUserById(s.user_id);
                const row = '<tr>'
                  +'<td><div class="flex gap-2">'
                  +'<div class="avatar" style="width:26px;height:26px;font-size:10px">'+(usr?.avatar||usr?.name?.slice(0,2)||'??')+'</div>'
                  +'<div><div style="font-size:13px;font-weight:500">'+(usr?.name||'—')+'</div>'
                  +'<div style="font-size:11px;color:var(--text3)">'+(usr?.funcao||'')+'</div></div></div></td>'
                  
                  +'<td style="font-size:12px">'+formatDate(s.data_inicio)+'</td>'
                  +'<td style="font-size:12px">'+formatDate(s.data_fim)+'</td>'
                  +'<td style="font-size:12px">'+s.dias+'d</td>'
                  +'<td>'+getStatusBadge(s.status)+'</td>'
                  +'</tr>';
                return row;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    })()}
  </div>`;
}

function viewPeople() {
  const u = state.currentUser;
  const hoje = new Date().toISOString().slice(0,10);

  // solicitações aprovadas, escopo: admin vê tudo, people vê tudo aprovado
  const aprovadas = state.solicitacoes.filter(s => s.status === 'Aprovada');
  const pendenteCiencia = aprovadas.filter(s => !s.people_acknowledged);
  const comCiencia = aprovadas.filter(s => s.people_acknowledged);

  // filtros
  const fUser = state.peopleFiltroUser || '';
  const fIni  = state.peopleFiltroInicio || '';
  const fFim  = state.peopleFiltroFim || '';

  let lista = pendenteCiencia;
  if (fUser)  lista = lista.filter(s => s.user_id === fUser);
  if (fIni)   lista = lista.filter(s => s.data_inicio >= fIni);
  if (fFim)   lista = lista.filter(s => s.data_fim <= fFim);

  const todosIds = lista.map(s => s.id);
  const todasSelecionadas = todosIds.length > 0 && todosIds.every(id => state.peopleSelected.includes(id));

  return `<div id="content">
    <div class="page-header flex-between" style="margin-bottom:24px">
      <div>
        <div class="breadcrumb"><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">GestAus</span><span class="breadcrumb-sep">›</span><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">Portal</span><span class="breadcrumb-sep">›</span><span onclick="state.view='dashboard';render()" style="cursor:pointer">Disponibilidade PJ</span><span class="breadcrumb-sep">›</span><span>Confirmação do People</span></div>
        <div class="page-title">Confirmação do People</div>
        <div class="page-desc">${pendenteCiencia.length} aguardando · ${comCiencia.length} confirmada${comCiencia.length!==1?'s':''}</div>
      </div>
      ${state.peopleSelected.length > 0 ? `
      <button class="btn btn-primary" onclick="registrarCiencia([${state.peopleSelected.join(',')}])">
        ✓ Confirmar (${state.peopleSelected.length} selecionada${state.peopleSelected.length>1?'s':''})
      </button>` : ''}
    </div>

    <!-- Resumo -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px">
      <div class="stat-card">
        <div class="stat-label">Aguardando confirmação</div>
        <div class="stat-value ${pendenteCiencia.length>0?'stat-amber':'stat-green'}">${pendenteCiencia.length}</div>
        <div class="stat-sub">ausência(s) pendentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmação registrada</div>
        <div class="stat-value stat-green">${comCiencia.length}</div>
        <div class="stat-sub">ausência(s) confirmadas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Selecionadas</div>
        <div class="stat-value stat-blue">${state.peopleSelected.length}</div>
        <div class="stat-sub">para ação em massa</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card mb-4" style="padding:14px 16px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div>
          <label>Colaborador</label>
          <select onchange="state.peopleFiltroUser=this.value;render()">
            <option value="">Todos</option>
            ${state.users.filter(x=>x.role!=='admin').map(x=>`<option value="${x.id}" ${fUser===x.id?'selected':''}>${x.name.split(' ')[0]}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>De</label>
          <input type="date" value="${fIni}" onchange="state.peopleFiltroInicio=this.value;render()">
        </div>
        <div>
          <label>Até</label>
          <input type="date" value="${fFim}" onchange="state.peopleFiltroFim=this.value;render()">
        </div>
      </div>
    </div>

    <!-- Lista aguardando confirmação -->
    ${lista.length === 0
      ? `<div class="empty-state card"><div class="empty-icon">✅</div><div class="empty-text">Nenhuma ausência aguardando confirmação</div><div class="empty-sub">Todas as ausências aprovadas já foram confirmadas</div></div>`
      : `<div class="card mb-4">
          <div class="flex-between mb-4">
            <div><div class="card-title">Aguardando confirmação</div><div class="card-sub">${lista.length} ausência(s)</div></div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
              <input type="checkbox" ${todasSelecionadas?'checked':''}
                onchange="if(this.checked){state.peopleSelected=[...new Set([...state.peopleSelected,...[${todosIds.join(',')}]])]}else{state.peopleSelected=state.peopleSelected.filter(id=>![${todosIds.join(',')}].includes(id))};render()">
              Selecionar todas
            </label>
          </div>
          <div class="table-wrap" style="border:none">
            <table>
              <thead><tr><th style="width:40px"></th><th>Colaborador</th><th>Período</th><th>Dias</th><th>Aprovado por</th><th>Ação</th></tr></thead>
              <tbody>
                ${lista.map(s => {
                  const usr = getUserById(s.user_id);
                  const sel = state.peopleSelected.includes(s.id);
                  return `<tr style="${sel?'background:var(--accent-light)':''}">

                        <div class="avatar" style="width:26px;height:26px;font-size:10px">${usr?.avatar||'??'}</div>

                        ✓ Confirmar
                      </button>
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>`}

    <!-- Lista com ciência registrada -->
    ${comCiencia.length > 0 ? `
    <div class="card">

function movAcaoStatus(id, perfil) {
  const sol = state.movSolicitacoes.find(x => x.id === id);
  if (!sol) return '';
  const acoes = [];
  if (sol.status === 'Rascunho' && (perfil === 'gestor' || perfil === 'admin' || perfil === 'colaborador')) {
    acoes.push(`<button class="btn btn-primary btn-sm" onclick="movMudarStatus(${id},'Enviada')">Enviar</button>`);
  }
  if (sol.status === 'Enviada' && (perfil === 'people' || perfil === 'admin')) {
    acoes.push(`<button class="btn btn-secondary btn-sm" onclick="movMudarStatus(${id},'Em análise')">Iniciar análise</button>`);
  }
  if (sol.status === 'Em análise' && (perfil === 'people' || perfil === 'admin')) {
    acoes.push(`<button class="btn btn-primary btn-sm" onclick="movMudarStatus(${id},'Aprovada')">Aprovar</button>`);
    acoes.push(`<button class="btn btn-danger btn-sm" onclick="movMudarStatus(${id},'Reprovada')">Reprovar</button>`);
  }
  if (sol.status === 'Aprovada' && (perfil === 'people' || perfil === 'admin')) {
    acoes.push(`<button class="btn btn-primary btn-sm" onclick="movMudarStatus(${id},'Concluída')">Concluir</button>`);
  }
  return acoes.join(' ');
}

function movMudarStatus(id, novoStatus) {
  const sol = state.movSolicitacoes.find(x => x.id === id);
  if (!sol) return;
  sol.historico = sol.historico || [];
  sol.historico.push({ status: novoStatus, por: state.currentUser.name, em: new Date().toISOString() });
  sol.status = novoStatus;
  sol.updatedAt = new Date().toISOString().slice(0,10);
  showToast('Status atualizado para ' + novoStatus + ' ✓');
  render();
}

function viewCalendario() {
  const now=new Date(); const year=now.getFullYear(); const month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const solsCalendario=getSolicitacoesDaArea(state.currentUser);
  const absencesByDay={}, conflictsByDay={};
  solsCalendario.filter(s=>['Aprovada','Realizada','Pendente'].includes(s.status)).forEach(s=>{
    const d1=new Date(s.data_inicio+'T12:00'), d2=new Date(s.data_fim+'T12:00');
    for(let d=new Date(d1);d<=d2;d.setDate(d.getDate()+1)){
      if(d.getMonth()===month&&d.getFullYear()===year){
        const key=d.getDate();
        if(!absencesByDay[key]) absencesByDay[key]=[];
        const user=getUserById(s.user_id);
        const squad=user?.squad||'';
        absencesByDay[key].push({name:user?.name?.split(' ')[0],tipo:s.tipo,status:s.status,userId:s.user_id,squad});
        if(!conflictsByDay[key]) conflictsByDay[key]={};
        if(!conflictsByDay[key][squad]) conflictsByDay[key][squad]=new Set();
        conflictsByDay[key][squad].add(s.user_id);
      }
    }
  });
  const conflictDays=new Set(Object.entries(conflictsByDay).filter(([,squads])=>Object.values(squads).some(set=>set.size>=2)).map(([day])=>parseInt(day)));
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===now.getDate(), abs=absencesByDay[d]||[], isConflict=conflictDays.has(d);
    const colors={'Aprovada':'#059669','Realizada':'#3730a3','Pendente':'#d97706'};
    cells+=`<div class="cal-day ${isToday?'today':''} ${abs.length?'has-event':''} ${isConflict?'conflict':''}" title="${isConflict?'⚠️ Conflito de cobertura':''}">
      <div class="cal-num" style="font-size:12px;font-weight:${isToday?'600':'400'}">${d}${isConflict?' ⚠':''}</div>
      ${abs.slice(0,3).map(a=>`<div class="cal-dot" style="background:${colors[a.status]||'#888'}"></div>`).join('')}
      ${abs.length>3?`<div style="font-size:9px;color:var(--text3)">+${abs.length-3}</div>`:''}
    </div>`;
  }
  const absencesThisMonth=solsCalendario.filter(s=>{
    const m=`${year}-${String(month+1).padStart(2,'0')}`;
    return (s.data_inicio.slice(0,7)===m||s.data_fim.slice(0,7)===m)&&['Aprovada','Realizada','Pendente'].includes(s.status);
  });
  return `<div id="content">
    <div class="breadcrumb"><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">GestAus</span><span class="breadcrumb-sep">›</span><span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">Portal</span><span class="breadcrumb-sep">›</span><span onclick="state.view='dashboard';render()" style="cursor:pointer">Disponibilidade PJ</span><span class="breadcrumb-sep">›</span><span>Calendário</span></div>
    <div class="page-header"><div class="page-title">Calendário de disponibilidade</div><div class="page-desc">${monthName}</div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;align-items:start">
      <div class="card">
        <div class="calendar-grid" style="margin-bottom:4px">${days.map(d=>`<div class="cal-header">${d}</div>`).join('')}</div>
        <div class="calendar-grid">${cells}</div>
        <div style="margin-top:14px;display:flex;gap:14px;font-size:11px;color:var(--text3);flex-wrap:wrap">
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#059669;margin-right:4px"></span>Aprovada</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#d97706;margin-right:4px"></span>Pendente</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#3730a3;margin-right:4px"></span>Realizada</span>
          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#fef3c7;border:1px solid #f59e0b;margin-right:4px"></span>⚠ Conflito</span>
        </div>
      </div>
      <div>
        ${conflictDays.size>0?`<div class="card mb-4" style="background:#fffbeb;border-color:#fcd34d">
          <div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:10px">⚠️ Conflitos de cobertura</div>
          <div style="font-size:12px;color:#92400e;line-height:1.6">
            ${[...conflictDays].sort((a,b)=>a-b).map(day=>{
              const squadsConflito=Object.entries(conflictsByDay[day]||{}).filter(([,set])=>set.size>=2).map(([squad,set])=>{
                const nomes=[...set].map(id=>getUserById(id)?.name?.split(' ')[0]).join(', ');
                return '<strong>'+squad+'</strong>: '+nomes;
              }).join(' · ');
              return '<div style="padding:4px 0;border-bottom:1px solid #fde68a">Dia <strong>'+day+'</strong> — '+squadsConflito+'</div>';
            }).join('')}
          </div>
        </div>`:''}
        <div class="card">
          <div class="card-title" style="margin-bottom:12px">Ausências neste mês</div>
          ${absencesThisMonth.length===0?`<div style="font-size:13px;color:var(--text3)">Nenhuma ausência registrada</div>`:
          absencesThisMonth.map(s=>{const u=getUserById(s.user_id);return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:13px;font-weight:500">${u?.name?.split(' ')[0]}</div><div style="font-size:11px;color:var(--text3)">${formatDate(s.data_inicio)} → ${formatDate(s.data_fim)}</div></div>
            <div style="text-align:right"><span class="badge badge-info" style="font-size:10px">${s.tipo}</span><br><span style="font-size:10px;margin-top:2px;display:block">${getStatusBadge(s.status)}</span></div>
          </div>`;}).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  // Lumi FAB: visível apenas quando logado
  const lumiFab   = document.getElementById('lumi-fab');
  const lumiPanel = document.getElementById('lumi-panel');
  if (lumiFab) lumiFab.style.display   = state.currentUser ? 'flex' : 'none';
  if (!state.currentUser) {
    if (typeof lumiReset === 'function') lumiReset();
    app.innerHTML = viewLogin(); return;
  }
  // Reset da Lumi ao trocar de módulo ou contexto
  const _lumiCtx = state.moduloAtivo + '|' + (state.currentUser?.id || '');
  if (typeof lumiReset === 'function' && lumiLastModulo !== undefined && lumiLastModulo !== _lumiCtx) {
    lumiReset();
  }
  lumiLastModulo = _lumiCtx;
  // Portal — interceptar para todos os perfis
  if (state.moduloAtivo === null) { app.innerHTML = viewPortalPeople(); return; }
  if (state.moduloAtivo === 'mov') { app.innerHTML = viewModuloMOV(); return; }
  // helpers de breadcrumb disponíveis globalmente
  window._bc = (modulo, pagina) =>
    `<div class="breadcrumb">
      <span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">GestAus</span>
      <span class="breadcrumb-sep">›</span>
      <span onclick="state.moduloAtivo=null;render()" style="cursor:pointer">Portal</span>
      <span class="breadcrumb-sep">›</span>
      <span style="color:var(--text2)">${modulo}</span>
      ${pagina?`<span class="breadcrumb-sep">›</span><span>${pagina}</span>`:''}
    </div>`;
  // moduloAtivo === 'ausencias' — cai no fluxo normal abaixo
  const viewMap = { dashboard:viewDashboard, minhas:viewMinhas, nova:viewNova, aprovacoes:viewAprovacoes, equipe:viewEquipe, calendario:viewCalendario, assistente:viewAssistente, usuarios:viewUsuarios, people:viewPeople };
  const viewFn = viewMap[state.view] || viewDashboard;
  const pending = getPendingDaArea(state.currentUser);
  app.innerHTML = `
  <div class="app-shell">
    ${viewSidebar()}
    <div id="main">
      <div id="menu-overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.style.display='none'"></div>
      <div id="topbar">
        <div style="display:flex;align-items:center;gap:8px">
          <button id="menu-toggle" onclick="const s=document.getElementById('sidebar');const o=document.getElementById('menu-overlay');s.classList.toggle('open');o.style.display=s.classList.contains('open')?'block':'none'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div style="font-size:13px;font-weight:500;color:var(--text2)">${
            {dashboard:'📊 Dashboard',minhas:'📋 Minhas ausências',nova:'➕ Nova solicitação',aprovacoes:'✅ Aprovação do Gestor',equipe:'👥 Equipe',calendario:'📅 Calendário',assistente:'🤖 Assistente IA',usuarios:'⚙️ Usuários',people:'👁️ Confirmação do People'}[state.view]||''
          }</div>
        </div>
        <div class="flex gap-2">
          ${pending>0&&(state.currentUser.role==='gestor'||state.currentUser.role==='admin')?`<button class="btn btn-danger btn-sm" onclick="state.view='aprovacoes';render()">${pending} pendente${pending>1?'s':''}</button>`:''}
        </div>
      </div>
      ${viewFn()}
    </div>
  </div>
  ${state.toast?`<div style="position:fixed;bottom:24px;right:24px;background:${state.toast.type==='error'?'var(--danger)':'var(--accent)'};color:white;padding:12px 20px;border-radius:var(--radius);box-shadow:var(--shadow-md);font-size:13px;font-weight:500;z-index:200;max-width:320px">${state.toast.msg}</div>`:''}`;
}

// ══════════════════════════════════════════
// BOOT — verificar sessão existente
// ══════════════════════════════════════════
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if (profile && profile.status === 'ativo') {
      state.currentUser = profile;
      await loadAllData();
      state.moduloAtivo = null; // todos entram no portal
    } else {
      await sb.auth.signOut();
    }
  }
  // ocultar loading global após inicialização
  const gl = document.getElementById('global-loading');
  if (gl) gl.style.display = 'none';
  render();
})();

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_OUT') {
    state.currentUser = null;
    state.users = []; state.colaboradores = []; state.solicitacoes = [];
    render();
  }
});
</script>
